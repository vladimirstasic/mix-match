<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="rgba(31,200,67,0.08)" stroke-width="1"/>
    </pattern>
    <radialGradient id="scrim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06080a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#06080a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1fc843" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#1fc843" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1fc843" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#06080a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- waveform bars (audio motif) -->
  <g fill="url(#wave)">
    <rect x="40"   y="350" width="6" height="20"/>
    <rect x="56"   y="340" width="6" height="40"/>
    <rect x="72"   y="320" width="6" height="80"/>
    <rect x="88"   y="300" width="6" height="120"/>
    <rect x="104"  y="280" width="6" height="160"/>
    <rect x="120"  y="270" width="6" height="180"/>
    <rect x="136"  y="290" width="6" height="140"/>
    <rect x="152"  y="310" width="6" height="100"/>
    <rect x="168"  y="330" width="6" height="60"/>
    <rect x="184"  y="345" width="6" height="30"/>
    <rect x="200"  y="350" width="6" height="20"/>

    <rect x="996"  y="350" width="6" height="20"/>
    <rect x="1012" y="340" width="6" height="40"/>
    <rect x="1028" y="320" width="6" height="80"/>
    <rect x="1044" y="300" width="6" height="120"/>
    <rect x="1060" y="280" width="6" height="160"/>
    <rect x="1076" y="270" width="6" height="180"/>
    <rect x="1092" y="290" width="6" height="140"/>
    <rect x="1108" y="310" width="6" height="100"/>
    <rect x="1124" y="330" width="6" height="60"/>
    <rect x="1140" y="345" width="6" height="30"/>
    <rect x="1156" y="350" width="6" height="20"/>
  </g>

  <!-- corner brackets -->
  <g stroke="#1fc843" stroke-width="3" fill="none" opacity="0.6">
    <path d="M 50 88 L 50 60 L 78 60"/>
    <path d="M 1150 88 L 1150 60 L 1122 60"/>
    <path d="M 50 542 L 50 570 L 78 570"/>
    <path d="M 1150 542 L 1150 570 L 1122 570"/>
  </g>

  <!-- top bar: LED + brand + BETA -->
  <g transform="translate(80, 95)">
    <circle cx="10" cy="10" r="6" fill="#1fc843"/>
    <text x="30" y="16" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" font-weight="700" letter-spacing="2" fill="#dfeadd">MIXMATCH</text>
    <text x="180" y="16" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" font-weight="500" fill="#1fc843">/studio</text>
    <g transform="translate(280, -2)">
      <rect width="60" height="22" fill="none" stroke="#1fc843" stroke-width="1.5"/>
      <text x="30" y="16" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" font-weight="600" letter-spacing="3" text-anchor="middle" fill="#1fc843">BETA</text>
    </g>
  </g>

  <!-- scrim behind headline -->
  <ellipse cx="600" cy="320" rx="500" ry="200" fill="url(#scrim)"/>

  <!-- kicker -->
  <text x="600" y="220" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" letter-spacing="4" text-anchor="middle" fill="#1fc843">// AI AUDIO FORENSICS — TRACK RECOGNITION</text>

  <!-- headline -->
  <text x="600" y="320" font-family="'Space Grotesk', system-ui, sans-serif" font-size="92" font-weight="700" letter-spacing="-2" text-anchor="middle" fill="#f4f1e8">Identify every track</text>
  <text x="600" y="410" font-family="'Space Grotesk', system-ui, sans-serif" font-size="92" font-weight="700" letter-spacing="-2" text-anchor="middle" fill="#f4f1e8">in your mix</text>

  <!-- subhead -->
  <text x="600" y="470" font-family="system-ui, sans-serif" font-size="22" text-anchor="middle" fill="rgba(223,234,221,0.62)">Drop a DJ set or a SoundCloud / Mixcloud link.</text>
  <text x="600" y="500" font-family="system-ui, sans-serif" font-size="22" text-anchor="middle" fill="rgba(223,234,221,0.62)">Get a timestamped tracklist with a confidence score on every hit.</text>

  <!-- footer mono strip -->
  <text x="600" y="585" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" text-anchor="middle" fill="rgba(223,234,221,0.4)">MIXMATCH.STUDIO · POWERED BY ACRCLOUD · BETA</text>
</svg>
